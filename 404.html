<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="assets/images/favicon-feather.png">
<link rel="apple-touch-icon" href="assets/images/favicon-feather.png">
<title>404 — страница не найдена · Dr.Laser</title>
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Tenor+Sans&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{
  height:100%;
  background:#080808;
  color:#f2ede6;
  font-family:'Tenor Sans',sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  position:relative;
}

/* ── decorative gold hair-lines ── */
.lines-bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.lines-bg svg{width:100%;height:100%;display:block}
.lines-bg path{fill:none;stroke-linecap:round;stroke-linejoin:round;vector-effect:non-scaling-stroke}

.glow{
  position:fixed;
  width:640px;height:640px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(196,160,104,0.10),transparent 70%);
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  pointer-events:none;
  z-index:0;
}

.wrap{
  position:relative;
  z-index:1;
  max-width:640px;
  margin:0 auto;
  padding:40px 24px;
  text-align:center;
}
.logo{
  margin-bottom:28px;
}
.logo img{
  height:34px;
  width:auto;
  display:inline-block;
}
.num{
  font-family:'Cormorant Garamond',serif;
  font-weight:300;
  font-size:clamp(96px,18vw,168px);
  line-height:0.9;
  letter-spacing:0.04em;
  color:transparent;
  -webkit-text-stroke:1.5px rgba(196,160,104,0.55);
  margin-bottom:8px;
}
h1{
  font-family:'Cormorant Garamond',serif;
  font-weight:300;
  font-size:clamp(28px,4.6vw,42px);
  line-height:1.25;
  letter-spacing:0.01em;
  color:#f2ede6;
  margin-bottom:22px;
}
h1 em{font-style:italic;color:#c4a068}
.lead{
  font-size:16px;
  line-height:1.85;
  color:rgba(242,237,230,0.72);
  max-width:480px;
  margin:0 auto 40px;
  font-weight:400;
}
.btn-row{
  display:flex;
  gap:16px;
  align-items:center;
  justify-content:center;
  flex-wrap:wrap;
}
.btn{
  font-size:11px;
  letter-spacing:0.25em;
  text-transform:uppercase;
  text-decoration:none;
  padding:16px 34px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  transition:all 0.2s;
  font-family:'Tenor Sans',sans-serif;
}
.btn-gold{
  background:#c4a068;
  color:#0a0a0c;
  border:1px solid #c4a068;
}
.btn-gold:hover{background:transparent;color:#c4a068}
.btn-outline{
  background:transparent;
  color:#f2ede6;
  border:1px solid rgba(255,255,255,0.25);
}
.btn-outline:hover{border-color:#c4a068;color:#c4a068}

@media(max-width:540px){
  .wrap{padding:32px 20px}
  .lead{font-size:15px}
  .btn{padding:15px 26px;font-size:10px}
}
</style>
</head>
<body>

<div class="lines-bg" aria-hidden="true">
  <svg viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <path d="M -60 250 C 460 60, 1220 420, 1980 180" stroke="rgba(168,131,75,0.13)" stroke-width="0.8"/>
    <path d="M -60 760 C 560 920, 1380 600, 1980 840" stroke="rgba(168,131,75,0.10)" stroke-width="0.6"/>
    <path d="M 860 -40 C 940 220, 760 480, 920 760" stroke="rgba(168,131,75,0.10)" stroke-width="0.6"/>

    <!-- feather: spine + soft barbs, drifting through center -->
    <path d="M 1010 120 C 1042 360, 1018 600, 950 820" stroke="rgba(168,131,75,0.20)" stroke-width="0.9"/>
    <path d="M 1018 200 C 1062 224, 1102 256, 1136 296" stroke="rgba(168,131,75,0.13)" stroke-width="0.6"/>
    <path d="M 1024 276 C 1070 298, 1112 332, 1148 374" stroke="rgba(168,131,75,0.12)" stroke-width="0.6"/>
    <path d="M 1022 354 C 1066 374, 1106 406, 1140 446" stroke="rgba(168,131,75,0.11)" stroke-width="0.6"/>
    <path d="M 1006 200 C 974 224, 936 256, 906 296" stroke="rgba(168,131,75,0.13)" stroke-width="0.6"/>
    <path d="M 1000 276 C 956 298, 916 332, 882 374" stroke="rgba(168,131,75,0.12)" stroke-width="0.6"/>
    <path d="M 994 354 C 952 374, 914 406, 882 446" stroke="rgba(168,131,75,0.11)" stroke-width="0.6"/>

    <!-- monogram flourish, lower right -->
    <path d="M 1430 840 C 1468 782, 1548 788, 1570 848 C 1592 908, 1530 952, 1474 924 C 1430 902, 1436 846, 1492 838 C 1518 834, 1536 856, 1524 880" stroke="rgba(168,131,75,0.16)" stroke-width="0.7"/>

    <path d="M 200 880 C 420 800, 600 920, 820 850" stroke="rgba(168,131,75,0.22)" stroke-width="0.7"/>
  </svg>
</div>
<div class="glow" aria-hidden="true"></div>

<div class="wrap">
  <div class="logo"><img src="assets/images/logo.png" alt="Dr.Laser"></div>
  <div class="num">404</div>
  <h1>Здесь гладко.<br><em>Слишком гладко</em></h1>
  <p class="lead">Страница, которую вы искали, исчезла так же бесследно, как лишние волоски после курса в нашей студии. Возможно, она переехала — а возможно, её никогда и не было. Но мы точно знаем, куда вам нужно.</p>
  <div class="btn-row">
    <a class="btn btn-gold" href="index.html">На главную</a>
    <a class="btn btn-outline" href="index.html#price">Смотреть цены и записаться</a>
  </div>
</div>

</body>
</html>
